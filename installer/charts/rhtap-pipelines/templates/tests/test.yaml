{{- $name := printf "%s-test-%d" .Chart.Name .Release.Revision -}}
---
apiVersion: v1
kind: Pod
metadata:
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: hook-succeeded
  labels:
    {{- include "rhtap-pipelines.labels" . | nindent 4 }}
  name: {{ $name }}
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Release.Name }}
  initContainers:
    #
    # Copying the scripts that will be used on the subsequent containers, the
    # scripts are shared via the "/scripts" volume.
    #
{{- include "pipelines.copyScripts" . | nindent 4 }}
  containers:
    - name: signing-secrets
      image: quay.io/codeready-toolchain/oc-client-base:latest
      command:
        - /scripts/test-signing-secrets.sh
      volumeMounts:
        - name: scripts
          mountPath: /scripts
      securityContext:
        allowPrivilegeEscalation: false
  volumes:
    - name: scripts
      emptyDir: {}
