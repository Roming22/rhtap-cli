---
{{- $namespace := .Release.Namespace -}}
apiVersion: v1
kind: Pod
metadata:
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    {{- include "common.labels" . | nindent 4 }}
  name: {{ printf "%s-test" .Chart.Name }}
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Release.Name }}
  initContainers:
    #
    # Copying the scripts that will be used on the subsequent containers, the
    # scripts are shared via the "/scripts" volume.
    #
    {{- include "common.copyScripts" . | nindent 4 }}
  containers:
    #
    # Test the SCM tokens.
    #
  {{- range list "bitbucket" "github" "gitlab" }}
    {{- $scm := . }}
    {{- $scmSecretName := (printf "rhtap-%s-integration" $scm) }}
    {{- $scmSecretObj := (lookup "v1" "Secret" $namespace $scmSecretName) }}
    {{- if $scmSecretObj }}
    - name: test-{{ $scm }}-token
      image: registry.redhat.io/openshift4/ose-tools-rhel9
      env:
        - name: SCM
          value: {{ $scm }}
        - name: TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $scmSecretName }}
              key: token
        - name: HOST
          valueFrom:
            secretKeyRef:
              name: {{ $scmSecretName }}
              key: host
      command:
        - /scripts/test-scm-token.sh
      volumeMounts:
        - name: scripts
          mountPath: /scripts
      securityContext:
        allowPrivilegeEscalation: false
    {{- end }}
  {{- end }}
    #
    # Make sure there's at least one container
    #
    - name: no-op
      image: quay.io/codeready-toolchain/oc-client-base:latest
      command:
        - bash
        - -c
        - "echo 'No op: Success'"
      securityContext:
        allowPrivilegeEscalation: false
  volumes:
    - name: scripts
      emptyDir: {}
